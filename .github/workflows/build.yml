name: 📑 Updating lists
on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: build-lists
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        if: "!contains(github.event.head_commit.message, '[bot] - Update lists')"
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Use Node 18.x
              uses: actions/setup-node@v4
              with:
                  node-version: 18.x

            - name: Install deps
              run: npm install

            - name: Build token lists
              run: node ./.github/scripts/generate-lists.mjs

            - name: Publish to IPFS
              run: PERSONAL_ACCESS_TOKEN=${{ secrets.FLEEK_PERSONAL_ACCESS_TOKEN }} PROJECT_ID=${{ secrets.FLEEK_PROJECT_ID }} node ./.github/scripts/push-to-ipfs.mjs

            - name: Commit files
              run: |
                  git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git diff --quiet || git commit -a -m "[bot] - Update lists"

            - name: Temporarily disable "include administrators" branch protection
              uses: benjefferies/branch-protection-bot@958128d33ada137a4c6012f838fc7c914c999190 # master 2024-02-22
              if: always()
              with:
                  access_token: ${{ secrets.ACCESS_TOKEN }}
                  owner: smoldapp
                  repo: tokenAssets
                  branch: ${{ github.event.repository.default_branch }}
                  enforce_admins: false

            - name: Push changes
              uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
              with:
                  github_token: ${{ secrets.ACCESS_TOKEN }}
                  branch: ${{ github.ref }}

            - name: Enable "include administrators" branch protection
              uses: benjefferies/branch-protection-bot@958128d33ada137a4c6012f838fc7c914c999190 # master 2024-02-22
              if: always() # Force to always run this step to ensure "include administrators" is always turned back on
              with:
                  access_token: ${{ secrets.ACCESS_TOKEN }}
                  owner: smoldapp
                  repo: tokenAssets
                  branch: ${{ github.event.repository.default_branch }}
                  enforce_admins: true

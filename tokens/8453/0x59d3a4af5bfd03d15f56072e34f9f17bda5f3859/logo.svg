<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Rusty AI token icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0052FF"/>
      <stop offset="1" stop-color="#001B66"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6A23A"/>
      <stop offset="0.55" stop-color="#C46A16"/>
      <stop offset="1" stop-color="#6B3510"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ED8CB"/>
      <stop offset="1" stop-color="#3A8F8B"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="14.7" fill="none" stroke="#FF9F0A" stroke-width="1.1"/>

  <!-- antennas -->
  <path d="M10.5 8.1 8.8 5.2M16 7.6V3.7M21.5 8.1l1.7-2.9" stroke="#5B3517" stroke-width="1.35" stroke-linecap="round"/>
  <circle cx="8.8" cy="5.2" r="1.75" fill="#C8751B" stroke="#2B1B0C" stroke-width=".65"/>
  <circle cx="16" cy="3.7" r="1.9" fill="#D8902B" stroke="#2B1B0C" stroke-width=".65"/>
  <circle cx="23.2" cy="5.2" r="1.75" fill="#C8751B" stroke="#2B1B0C" stroke-width=".65"/>

  <!-- ears -->
  <rect x="3.9" y="11.5" width="4" height="7.4" rx="1.7" fill="url(#teal)" stroke="#2B1B0C" stroke-width=".85"/>
  <rect x="24.1" y="11.5" width="4" height="7.4" rx="1.7" fill="url(#teal)" stroke="#2B1B0C" stroke-width=".85"/>

  <!-- head -->
  <rect x="6.6" y="8" width="18.8" height="13" rx="3" fill="url(#rust)" stroke="#24150A" stroke-width="1.1"/>
  <path d="M14 8.3h10.1c.7 0 1.3.6 1.3 1.3v3.9c-4.2-1.4-8.1-1.2-11.4.4z" fill="#F19A2F" opacity=".5"/>
  <path d="M15.2 9h3.7v11.4h-3.7z" fill="url(#teal)" opacity=".75"/>

  <!-- eyes -->
  <circle cx="11.8" cy="14" r="3.05" fill="#23170D" stroke="#D7B16D" stroke-width="1.05"/>
  <circle cx="20.2" cy="14" r="3.05" fill="#23170D" stroke="#D7B16D" stroke-width="1.05"/>
  <circle cx="12.55" cy="13.1" r=".82" fill="#FFF2C6"/>
  <circle cx="20.95" cy="13.1" r=".82" fill="#FFF2C6"/>

  <!-- mouth -->
  <rect x="11.5" y="18" width="9" height="1.35" rx=".7" fill="#120C07"/>

  <!-- body hint -->
  <rect x="10.2" y="22" width="11.6" height="5.2" rx="1.6" fill="url(#teal)" stroke="#24150A" stroke-width="1"/>
  <path d="M12 22.2h3.3v4.8H12zM18.1 22.2h2.2v4.8h-2.2z" fill="#C96D16" opacity=".8"/>
  <circle cx="12.1" cy="23.5" r=".65" fill="#D7B16D"/>
  <circle cx="19.9" cy="23.5" r=".65" fill="#D7B16D"/>

  <!-- Base cue -->
  <circle cx="24.6" cy="25" r="3" fill="#fff" stroke="#0052FF" stroke-width=".8"/>
  <path d="M22.8 25h3.6" stroke="#0052FF" stroke-width="1.15" stroke-linecap="round"/>
</svg>
